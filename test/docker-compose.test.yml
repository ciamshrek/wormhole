services:
  proxy:
    build: ..
    cap_add:
      - NET_ADMIN
    volumes:
      - ca-certs:/etc/mwh

  app:
    build: ./app
    network_mode: "service:proxy"
    depends_on:
      proxy:
        condition: service_healthy
    volumes:
      - ca-certs:/etc/mwh:ro
    environment:
      NODE_EXTRA_CA_CERTS: /etc/mwh/ca.crt

volumes:
  ca-certs:
