services:
  proxy:
    build:
      context: ../..
    cap_add:
      - NET_ADMIN
    volumes:
      - ../../handler.ts:/app/handler.ts:ro
      - ca-certs:/etc/mwh

  curl:
    image: curlimages/curl:8.12.1
    network_mode: "service:proxy"
    depends_on:
      proxy:
        condition: service_healthy
    volumes:
      - ca-certs:/etc/mwh:ro
    environment:
      TARGET_URL: ${TARGET_URL:-https://httpbin.org/headers}
    entrypoint:
      - /bin/sh
      - -lc
      - |
        exec curl --silent --show-error --fail \
          --cacert /etc/mwh/ca.crt \
          "$TARGET_URL"

volumes:
  ca-certs:
